<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="680" height="1100" viewBox="0 0 680 1100">
<style>
  text { font-family: Arial, Helvetica, sans-serif; }
  .th { font-weight: 600; fill: #292524; }
  .ts { font-size: 12px; fill: #57534E; }
  .tv { font-size: 11px; fill: #A8A29E; font-family: 'Courier New', monospace; }
  .res { stroke: #A8A29E; stroke-width: 0.5; stroke-dasharray: 3 3; fill: none; }
  a:hover rect { stroke-width: 2 !important; }
  a:hover .ts { fill: #292524; }
</style>
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#A8A29E" stroke-width="1.5" stroke-linecap="round"/>
  </marker>
</defs>

<rect width="680" height="1100" fill="#F9F9F7"/>

<!-- Title -->
<text class="th" x="340" y="30" text-anchor="middle" font-size="16">CNN Architecture — Clickable Components</text>
<text class="ts" x="340" y="50" text-anchor="middle" font-size="11" fill="#A8A29E">Click any block to open its topic in the knowledge graph</text>

<!-- ======== INPUT ======== -->
<rect x="230" y="70" width="220" height="36" rx="6" fill="#F0EFEB" stroke="#D6D3CC" stroke-width="0.5"/>
<text class="ts" x="340" y="92" text-anchor="middle">Input signal / image</text>
<text class="tv" x="195" y="92" text-anchor="end">[B, C, H, W]</text>
<line x1="340" y1="106" x2="340" y2="130" stroke="#A8A29E" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- ======== CONV BLOCK 1 ======== -->
<rect x="140" y="130" width="400" height="180" rx="10" fill="#EDF6F1" fill-opacity="0.4" stroke="#3D7F5F" stroke-width="1"/>
<text class="th" x="340" y="152" text-anchor="middle" font-size="11" fill="#3D7F5F">Conv Block 1 — Low-level features (edges, frequencies)</text>

<!-- Conv layer -->
<a xlink:href="http://localhost:8000/viewer.html#CNN.CONVOLUTION">
  <rect x="195" y="162" width="190" height="30" rx="6" fill="#EDF6F1" stroke="#3D7F5F" stroke-width="1" cursor="pointer"/>
  <text class="ts" x="290" y="181" text-anchor="middle">Conv2d (k=3, stride=1)</text>
</a>
<text class="tv" x="160" y="181" text-anchor="end">W₁ ∈ [C_out, C_in, 3, 3]</text>
<line x1="290" y1="192" x2="290" y2="206" stroke="#A8A29E" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- BatchNorm -->
<a xlink:href="http://localhost:8000/viewer.html#TRANSFORMER.LAYER_NORM">
  <rect x="210" y="206" width="160" height="26" rx="4" fill="#F0EFEB" stroke="#D6D3CC" stroke-width="0.5" cursor="pointer"/>
  <text class="ts" x="290" y="223" text-anchor="middle">BatchNorm</text>
</a>
<line x1="290" y1="232" x2="290" y2="246" stroke="#A8A29E" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- ReLU -->
<a xlink:href="http://localhost:8000/viewer.html#FOUNDATIONS.ACTIVATIONS">
  <rect x="225" y="246" width="130" height="26" rx="4" fill="#F1EFFE" stroke="#6B5CE7" stroke-width="0.5" cursor="pointer"/>
  <text class="ts" x="290" y="263" text-anchor="middle">ReLU</text>
</a>
<line x1="290" y1="272" x2="290" y2="286" stroke="#A8A29E" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Max Pool -->
<rect x="225" y="286" width="130" height="26" rx="4" fill="#FEF4EB" stroke="#B8621B" stroke-width="0.5"/>
<text class="ts" x="290" y="303" text-anchor="middle">MaxPool (2×2)</text>

<!-- Annotations block 1 -->
<text class="tv" x="420" y="181" text-anchor="start">← Learned FIR filters</text>
<text class="tv" x="420" y="223" text-anchor="start">← Variance control (like LN)</text>
<text class="tv" x="420" y="263" text-anchor="start">← Makes cascade meaningful</text>
<text class="tv" x="420" y="303" text-anchor="start">← Decimation / downsample</text>

<text class="tv" x="160" y="303" text-anchor="end">[B, C₁, H/2, W/2]</text>
<line x1="340" y1="310" x2="340" y2="340" stroke="#A8A29E" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- ======== CONV BLOCK 2 ======== -->
<rect x="140" y="340" width="400" height="180" rx="10" fill="#EDF6F1" fill-opacity="0.4" stroke="#3D7F5F" stroke-width="1"/>
<text class="th" x="340" y="362" text-anchor="middle" font-size="11" fill="#3D7F5F">Conv Block 2 — Mid-level features (textures, parts)</text>

<a xlink:href="http://localhost:8000/viewer.html#CNN.CONVOLUTION">
  <rect x="195" y="372" width="190" height="30" rx="6" fill="#EDF6F1" stroke="#3D7F5F" stroke-width="1" cursor="pointer"/>
  <text class="ts" x="290" y="391" text-anchor="middle">Conv2d (k=3, stride=1)</text>
</a>
<text class="tv" x="160" y="391" text-anchor="end">W₂ ∈ [C₂, C₁, 3, 3]</text>
<line x1="290" y1="402" x2="290" y2="416" stroke="#A8A29E" stroke-width="1.5" marker-end="url(#arrow)"/>

<a xlink:href="http://localhost:8000/viewer.html#TRANSFORMER.LAYER_NORM">
  <rect x="210" y="416" width="160" height="26" rx="4" fill="#F0EFEB" stroke="#D6D3CC" stroke-width="0.5" cursor="pointer"/>
  <text class="ts" x="290" y="433" text-anchor="middle">BatchNorm</text>
</a>
<line x1="290" y1="442" x2="290" y2="456" stroke="#A8A29E" stroke-width="1.5" marker-end="url(#arrow)"/>

<a xlink:href="http://localhost:8000/viewer.html#FOUNDATIONS.ACTIVATIONS">
  <rect x="225" y="456" width="130" height="26" rx="4" fill="#F1EFFE" stroke="#6B5CE7" stroke-width="0.5" cursor="pointer"/>
  <text class="ts" x="290" y="473" text-anchor="middle">ReLU</text>
</a>
<line x1="290" y1="482" x2="290" y2="496" stroke="#A8A29E" stroke-width="1.5" marker-end="url(#arrow)"/>

<rect x="225" y="496" width="130" height="26" rx="4" fill="#FEF4EB" stroke="#B8621B" stroke-width="0.5"/>
<text class="ts" x="290" y="513" text-anchor="middle">MaxPool (2×2)</text>

<text class="tv" x="160" y="513" text-anchor="end">[B, C₂, H/4, W/4]</text>
<line x1="340" y1="520" x2="340" y2="550" stroke="#A8A29E" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- ======== CONV BLOCK 3 ======== -->
<rect x="140" y="550" width="400" height="180" rx="10" fill="#EDF6F1" fill-opacity="0.4" stroke="#3D7F5F" stroke-width="1"/>
<text class="th" x="340" y="572" text-anchor="middle" font-size="11" fill="#3D7F5F">Conv Block 3 — High-level features (objects, patterns)</text>

<a xlink:href="http://localhost:8000/viewer.html#CNN.CONVOLUTION">
  <rect x="195" y="582" width="190" height="30" rx="6" fill="#EDF6F1" stroke="#3D7F5F" stroke-width="1" cursor="pointer"/>
  <text class="ts" x="290" y="601" text-anchor="middle">Conv2d (k=3, stride=1)</text>
</a>
<text class="tv" x="160" y="601" text-anchor="end">W₃ ∈ [C₃, C₂, 3, 3]</text>
<line x1="290" y1="612" x2="290" y2="626" stroke="#A8A29E" stroke-width="1.5" marker-end="url(#arrow)"/>

<a xlink:href="http://localhost:8000/viewer.html#TRANSFORMER.LAYER_NORM">
  <rect x="210" y="626" width="160" height="26" rx="4" fill="#F0EFEB" stroke="#D6D3CC" stroke-width="0.5" cursor="pointer"/>
  <text class="ts" x="290" y="643" text-anchor="middle">BatchNorm</text>
</a>
<line x1="290" y1="652" x2="290" y2="666" stroke="#A8A29E" stroke-width="1.5" marker-end="url(#arrow)"/>

<a xlink:href="http://localhost:8000/viewer.html#FOUNDATIONS.ACTIVATIONS">
  <rect x="225" y="666" width="130" height="26" rx="4" fill="#F1EFFE" stroke="#6B5CE7" stroke-width="0.5" cursor="pointer"/>
  <text class="ts" x="290" y="683" text-anchor="middle">ReLU</text>
</a>
<line x1="290" y1="692" x2="290" y2="706" stroke="#A8A29E" stroke-width="1.5" marker-end="url(#arrow)"/>

<rect x="210" y="706" width="160" height="26" rx="4" fill="#FEF4EB" stroke="#B8621B" stroke-width="0.5"/>
<text class="ts" x="290" y="723" text-anchor="middle">Global Avg Pool</text>

<text class="tv" x="160" y="723" text-anchor="end">[B, C₃]</text>
<line x1="340" y1="730" x2="340" y2="758" stroke="#A8A29E" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- ======== OPTIONAL: HYBRID HANDOFF ======== -->
<rect x="170" y="758" width="340" height="40" rx="8" fill="#EEF7F5" stroke="#2A7C6F" stroke-width="1.5" stroke-dasharray="6 3"/>
<a xlink:href="http://localhost:8000/viewer.html#HYBRID.CNN_TRANSFORMER">
  <text class="th" x="340" y="782" text-anchor="middle" font-size="12" fill="#2A7C6F" cursor="pointer">→ Transformer (features become tokens)</text>
</a>
<text class="tv" x="540" y="782" text-anchor="start">optional hybrid</text>
<line x1="340" y1="798" x2="340" y2="826" stroke="#A8A29E" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- ======== CLASSIFIER HEAD ======== -->
<rect x="210" y="826" width="260" height="80" rx="10" fill="#F0EFEB" fill-opacity="0.5" stroke="#D6D3CC" stroke-width="1"/>
<text class="th" x="340" y="848" text-anchor="middle" font-size="11" fill="#57534E">Classification Head</text>

<rect x="240" y="856" width="200" height="26" rx="4" fill="#EDF3FC" stroke="#3B6EC2" stroke-width="0.5"/>
<text class="ts" x="340" y="873" text-anchor="middle">Linear → Softmax</text>
<text class="tv" x="205" y="873" text-anchor="end">W_fc ∈ [C₃, V]</text>

<line x1="340" y1="906" x2="340" y2="930" stroke="#A8A29E" stroke-width="1.5" marker-end="url(#arrow)"/>
<text class="th" x="340" y="948" text-anchor="middle" font-size="12">Output: class probabilities [B, V]</text>

<!-- ======== ANNOTATIONS ======== -->
<line x1="50" y1="975" x2="630" y2="975" stroke="#E7E5E0" stroke-width="0.5"/>
<text class="th" x="340" y="1000" text-anchor="middle" font-size="12">What to see here</text>

<text class="ts" x="60" y="1024" font-size="11">Each Conv Block = Conv → BatchNorm → ReLU → Pool. This is the fundamental CNN unit.</text>
<text class="ts" x="60" y="1044" font-size="11">Conv = learned FIR filter (spatial pattern detector). BatchNorm = variance control. ReLU = makes cascading meaningful.</text>
<text class="ts" x="60" y="1064" font-size="11">Blocks stack hierarchically: edges → textures → objects. Each block's features are next block's input (FIRs feeding FIRs).</text>
<text class="ts" x="60" y="1084" font-size="11">Dashed box: optional hybrid — CNN features become tokens for a transformer. Natural local-then-global architecture.</text>

</svg>
