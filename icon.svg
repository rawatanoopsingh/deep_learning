<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1C1917"/>
      <stop offset="100%" stop-color="#292524"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2A7C6F"/>
      <stop offset="100%" stop-color="#6B5CE7"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="512" height="512" rx="110" fill="url(#bg)"/>

  <!-- Subtle grid lines -->
  <g stroke="#3A3530" stroke-width="0.5" opacity="0.3">
    <line x1="128" y1="80" x2="128" y2="432"/>
    <line x1="256" y1="80" x2="256" y2="432"/>
    <line x1="384" y1="80" x2="384" y2="432"/>
    <line x1="80" y1="160" x2="432" y2="160"/>
    <line x1="80" y1="256" x2="432" y2="256"/>
    <line x1="80" y1="352" x2="432" y2="352"/>
  </g>

  <!-- Connection lines (edges) -->
  <g stroke="#4A4540" stroke-width="2" fill="none">
    <!-- Layer 1 to Layer 2 -->
    <line x1="128" y1="160" x2="256" y2="120"/>
    <line x1="128" y1="160" x2="256" y2="200"/>
    <line x1="128" y1="256" x2="256" y2="120"/>
    <line x1="128" y1="256" x2="256" y2="200"/>
    <line x1="128" y1="256" x2="256" y2="300"/>
    <line x1="128" y1="352" x2="256" y2="200"/>
    <line x1="128" y1="352" x2="256" y2="300"/>
    <line x1="128" y1="352" x2="256" y2="392"/>
    <!-- Layer 2 to Layer 3 -->
    <line x1="256" y1="120" x2="384" y2="190"/>
    <line x1="256" y1="200" x2="384" y2="190"/>
    <line x1="256" y1="200" x2="384" y2="310"/>
    <line x1="256" y1="300" x2="384" y2="190"/>
    <line x1="256" y1="300" x2="384" y2="310"/>
    <line x1="256" y1="392" x2="384" y2="310"/>
  </g>

  <!-- Attention arcs (the distinctive transformer element) -->
  <g fill="none" stroke-width="1.5" opacity="0.6">
    <path d="M256 120 Q310 160 256 200" stroke="#6B5CE7"/>
    <path d="M256 200 Q320 250 256 300" stroke="#6B5CE7"/>
    <path d="M256 300 Q310 346 256 392" stroke="#6B5CE7"/>
    <!-- Cross attention arc -->
    <path d="M160 256 Q256 180 350 190" stroke="#C4704B" stroke-width="2" stroke-dasharray="6 4"/>
  </g>

  <!-- Highlighted connection lines (active paths) -->
  <g stroke="url(#glow)" stroke-width="2.5" fill="none" opacity="0.7">
    <line x1="128" y1="256" x2="256" y2="200"/>
    <line x1="256" y1="200" x2="384" y2="190"/>
  </g>

  <!-- Layer 1 nodes (input) -->
  <g>
    <circle cx="128" cy="160" r="18" fill="#1C1917" stroke="#2A7C6F" stroke-width="2.5"/>
    <circle cx="128" cy="160" r="6" fill="#2A7C6F" opacity="0.8"/>

    <circle cx="128" cy="256" r="22" fill="#1C1917" stroke="#2A7C6F" stroke-width="3"/>
    <circle cx="128" cy="256" r="8" fill="#2A7C6F"/>

    <circle cx="128" cy="352" r="18" fill="#1C1917" stroke="#2A7C6F" stroke-width="2.5"/>
    <circle cx="128" cy="352" r="6" fill="#2A7C6F" opacity="0.8"/>
  </g>

  <!-- Layer 2 nodes (hidden / attention) -->
  <g>
    <circle cx="256" cy="120" r="16" fill="#1C1917" stroke="#6B5CE7" stroke-width="2.5"/>
    <circle cx="256" cy="120" r="5" fill="#6B5CE7" opacity="0.8"/>

    <circle cx="256" cy="200" r="24" fill="#1C1917" stroke="#6B5CE7" stroke-width="3"/>
    <circle cx="256" cy="200" r="10" fill="#6B5CE7"/>

    <circle cx="256" cy="300" r="20" fill="#1C1917" stroke="#6B5CE7" stroke-width="2.5"/>
    <circle cx="256" cy="300" r="7" fill="#6B5CE7" opacity="0.9"/>

    <circle cx="256" cy="392" r="16" fill="#1C1917" stroke="#6B5CE7" stroke-width="2.5"/>
    <circle cx="256" cy="392" r="5" fill="#6B5CE7" opacity="0.8"/>
  </g>

  <!-- Layer 3 nodes (output) -->
  <g>
    <circle cx="384" cy="190" r="22" fill="#1C1917" stroke="#C4704B" stroke-width="3"/>
    <circle cx="384" cy="190" r="8" fill="#C4704B"/>

    <circle cx="384" cy="310" r="22" fill="#1C1917" stroke="#C4704B" stroke-width="3"/>
    <circle cx="384" cy="310" r="8" fill="#C4704B"/>
  </g>

  <!-- Label -->
  <text x="256" y="468" text-anchor="middle" font-family="-apple-system, 'SF Pro Display', Helvetica, Arial, sans-serif" font-size="36" font-weight="600" fill="#A8A29E" letter-spacing="3">DL</text>
</svg>
