<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#2A7C6F">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="apple-touch-icon" href="icon.svg">
<title>DL Knowledge Graph</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/contrib/auto-render.min.js"></script>
<style>
:root{--bg1:#F9F9F7;--bg2:#FFF;--bg3:#F0EFEB;--bg4:#EAE9E4;--t1:#292524;--t2:#57534E;--t3:#A8A29E;--bd:#E7E5E0;--bd2:#D6D3CC;--ac:#C4704B;--acl:#FDF4EF;--te:#2A7C6F;--tel:#EEF7F5;--pu:#6B5CE7;--pul:#F1EFFE;--bl:#3B6EC2;--bll:#EDF3FC;--gr:#3D7F5F;--grl:#EDF6F1;--or:#B8621B;--orl:#FEF4EB;--re:#C4443D;--rel:#FDF0EF;--f:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;--fm:'SF Mono','Fira Code',Menlo,Consolas,monospace;--r1:6px;--r2:8px;--r3:12px;--fs:13px}
@media(prefers-color-scheme:dark){:root{--bg1:#1C1917;--bg2:#262320;--bg3:#302C28;--bg4:#3A3530;--t1:#E7E5E0;--t2:#A8A29E;--t3:#78716C;--bd:#3A3530;--bd2:#4A4540;--acl:#2E2219;--tel:#1A2E2A;--pul:#22203A;--bll:#1A2535;--grl:#1A2E22;--orl:#2E2519;--rel:#2E1F1E}.katex{color:var(--t1)}}
*{box-sizing:border-box;margin:0;padding:0}body{font-family:var(--f);background:var(--bg1);color:var(--t1);line-height:1.6;-webkit-font-smoothing:antialiased;font-size:var(--fs)}
.ctr{max-width:1100px;margin:0 auto;padding:24px 20px}
.hdr{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
h1{font-size:22px;font-weight:600;letter-spacing:-.3px}.sub{color:var(--t3);font-size:12px;margin-top:2px}
.font-ctl{display:flex;gap:4px;align-items:center;margin-top:4px}
.font-ctl button{width:28px;height:28px;border:1px solid var(--bd);border-radius:var(--r1);background:var(--bg2);color:var(--t2);cursor:pointer;font-size:14px;font-weight:600;display:flex;align-items:center;justify-content:center}
.font-ctl button:hover{border-color:var(--bd2);color:var(--t1)}
.font-ctl span{font-size:11px;color:var(--t3);min-width:30px;text-align:center}
.nav{display:flex;gap:2px;margin:16px 0;background:var(--bg3);border-radius:var(--r2);padding:3px;width:fit-content;flex-wrap:wrap}
.nav button{padding:6px 14px;border:none;border-radius:var(--r1);background:0;color:var(--t2);cursor:pointer;font-size:12px;font-weight:500;font-family:var(--f);white-space:nowrap}
.nav button:hover{color:var(--t1);background:var(--bg4)}.nav button.on{background:var(--bg2);color:var(--t1);box-shadow:0 1px 3px rgba(0,0,0,.08)}
.search-box{margin-bottom:16px;position:relative}
.search-box input{width:100%;max-width:400px;padding:8px 12px 8px 34px;border:1px solid var(--bd);border-radius:var(--r2);background:var(--bg2);color:var(--t1);font-size:var(--fs);font-family:var(--f);outline:none}
.search-box input:focus{border-color:var(--te);box-shadow:0 0 0 2px rgba(42,124,111,.15)}
.search-box .icon{position:absolute;left:10px;top:9px;color:var(--t3);font-size:14px}
#sr .sr-item{padding:8px 12px;border-radius:var(--r1);cursor:pointer}.sr-item:hover{background:var(--bg3)}
.sr-item .sr-title{font-weight:600}.sr-item .sr-match{font-size:11px;color:var(--t3);margin-top:2px}
.grp{margin-bottom:28px}.gt{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:1.2px;color:var(--t3);margin-bottom:10px}
.tg{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:8px}
.tc{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--r3);padding:14px 16px;cursor:pointer;transition:all .15s}
.tc:hover{border-color:var(--bd2);box-shadow:0 2px 8px rgba(0,0,0,.04);transform:translateY(-1px)}
.tc .ti{font-weight:600;margin-bottom:4px;line-height:1.4}.tc .sm{font-size:.9em;color:var(--t2);line-height:1.5}
.cm{display:flex;align-items:center;gap:6px;margin-bottom:8px}
.st{display:inline-block;font-size:10px;padding:3px 10px;border-radius:12px;font-weight:700;letter-spacing:.3px;border:1px solid}
.st-solid{background:#d1fae5;color:#065f46;border-color:#6ee7b7}.st-synthesized{background:#dbeafe;color:#1e40af;border-color:#93c5fd}
.st-deepened{background:#ede9fe;color:#5b21b6;border-color:#c4b5fd}.st-covered{background:#e5e7eb;color:#374151;border-color:#9ca3af}
.st-exploring{background:#ffedd5;color:#9a3412;border-color:#fdba74}.st-introduced{background:#fce7f3;color:#9d174d;border-color:#f9a8d4}
.st-strong_intuition,.st-initial_intuition{background:#ccfbf1;color:#115e59;border-color:#5eead4}
.st-skeleton{background:#f3f4f6;color:#6b7280;border-color:#d1d5db;border-style:dashed}
@media(prefers-color-scheme:dark){.st-solid{background:#064e3b;color:#6ee7b7;border-color:#065f46}.st-synthesized{background:#1e3a5f;color:#93c5fd;border-color:#1e40af}.st-deepened{background:#2e1065;color:#c4b5fd;border-color:#5b21b6}.st-covered{background:#1f2937;color:#9ca3af;border-color:#374151}.st-exploring{background:#431407;color:#fdba74;border-color:#9a3412}.st-introduced{background:#500724;color:#f9a8d4;border-color:#9d174d}.st-strong_intuition,.st-initial_intuition{background:#042f2e;color:#5eead4;border-color:#115e59}.st-skeleton{background:#1f2937;color:#6b7280;border-color:#374151}}
.mb{font-size:10px;color:var(--pu);font-weight:500}
.det{display:none}.det.on{display:block}
.bk{font-size:var(--fs);color:var(--t2);cursor:pointer;display:inline-flex;align-items:center;gap:4px;margin-bottom:16px;padding:4px 0}.bk:hover{color:var(--t1)}
.dh{margin-bottom:24px;padding-bottom:16px;border-bottom:1px solid var(--bd)}
.dt{font-size:1.4em;font-weight:600;letter-spacing:-.3px;margin-top:8px}.dp{font-size:.85em;color:var(--t3);margin-top:4px;font-family:var(--fm)}
.ds{color:var(--t2);margin-top:12px;line-height:1.7}
.sec{margin-bottom:24px}.stl{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;color:var(--t3);margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--bd)}
.il{list-style:none;padding:0}.il li{padding:5px 0 5px 18px;position:relative;line-height:1.5}.il li::before{content:"→";position:absolute;left:0;color:var(--te);font-weight:600}
.mblk{background:var(--pul);border-left:3px solid var(--pu);padding:10px 14px;margin:6px 0;border-radius:0 var(--r1) var(--r1) 0;line-height:1.8;overflow-x:auto}.mblk .katex-display{margin:.4em 0}.mblk strong{font-family:var(--f)}
.drv{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--r2);margin:8px 0;overflow:hidden}
.dvt{font-weight:600;padding:10px 14px;cursor:pointer;display:flex;justify-content:space-between;align-items:center}.dvt:hover{background:var(--bg3)}.dvt .ar{transition:transform .2s;font-size:10px;color:var(--t3)}.drv.op .ar{transform:rotate(90deg)}.dvb{display:none;padding:0 14px 14px}.drv.op .dvb{display:block}
.stp{margin:8px 0;padding:10px 12px;background:var(--bg3);border-radius:var(--r1)}.stn{font-size:.9em;font-weight:600;color:var(--te);margin-bottom:4px}.stm{line-height:1.8}.str{color:var(--ac);margin-top:4px;font-weight:500;font-size:.9em}
.csq{color:var(--pu);font-weight:500;margin-top:10px;padding:10px 12px;background:var(--pul);border-radius:var(--r1);line-height:1.5}
.pb{padding:8px 12px;margin:4px 0;border-radius:var(--r1);font-size:.9em;line-height:1.5}.pg{background:var(--grl);border-left:3px solid var(--gr)}.ps{background:var(--orl);border-left:3px solid var(--or)}.pn{background:var(--rel);border-left:3px solid var(--re)}.pl{font-weight:600;font-size:10px;text-transform:uppercase;letter-spacing:.5px}
.cl{list-style:none;padding:0}.cl li{font-size:.9em;padding:3px 0;color:var(--t2)}.ct{font-weight:600;color:var(--te);font-size:10px;text-transform:uppercase;margin-right:4px}.clk{color:var(--bl);cursor:pointer;border-bottom:1px dashed var(--bl);text-decoration:none}.clk:hover{border-bottom-style:solid}
.oq{background:var(--orl);border:1px solid var(--or);border-radius:var(--r2);padding:12px 14px;margin:8px 0}.oqt{font-weight:600;color:var(--or)}.oqx{font-size:.9em;color:var(--t2);margin-top:4px}
.nt{font-size:.9em;color:var(--t3);font-style:italic;padding:4px 0}
.ne textarea{width:100%;min-height:100px;padding:12px;border:1px solid var(--bd);border-radius:var(--r2);background:var(--bg2);color:var(--t1);font-family:var(--f);font-size:var(--fs);line-height:1.6;resize:vertical;outline:none}.ne textarea:focus{border-color:var(--te);box-shadow:0 0 0 2px rgba(42,124,111,.15)}
.na{display:flex;gap:8px;margin-top:8px;align-items:center}.na button{padding:6px 14px;border-radius:var(--r1);font-size:12px;font-weight:500;cursor:pointer;font-family:var(--f);border:1px solid var(--bd)}.bs{background:var(--te);color:#fff;border-color:var(--te)}.bs:hover{opacity:.9}.bc{background:var(--bg2);color:var(--t2)}.ss{font-size:11px;color:var(--te);font-weight:500;opacity:0;transition:opacity .3s}.ss.sh{opacity:1}
.arch-tabs{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}.arch-tab{padding:6px 14px;border:1px solid var(--bd);border-radius:var(--r1);background:var(--bg2);cursor:pointer;font-size:12px;font-weight:500}.arch-tab:hover{border-color:var(--bd2)}.arch-tab.on{background:var(--te);color:#fff;border-color:var(--te)}
.arch-svg{width:100%;border:1px solid var(--bd);border-radius:var(--r3);background:var(--bg2)}
.arch-svg .ablock{cursor:pointer;transition:opacity .15s}.arch-svg .ablock:hover{opacity:.8}.arch-svg .ablock:hover rect{stroke-width:2.5}
.gg{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:12px}.gc{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--r3);overflow:hidden;transition:all .15s}.gc:hover{border-color:var(--bd2);box-shadow:0 2px 12px rgba(0,0,0,.06)}.gp{width:100%;aspect-ratio:16/10;object-fit:contain;background:var(--bg3);border-bottom:1px solid var(--bd);padding:8px;cursor:pointer}.gi{padding:10px 14px}.gi .ti{font-weight:600;margin-bottom:2px;font-size:.95em}.gi .de{font-size:11px;color:var(--t2)}.gi .tr{font-size:10px;color:var(--t3);font-family:var(--fm);margin-top:4px}
.lb{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.85);z-index:100;align-items:center;justify-content:center;cursor:pointer}.lb.on{display:flex}.lb img,.lb object{max-width:95%;max-height:95%;object-fit:contain}.lbc{position:fixed;top:16px;right:20px;color:#fff;font-size:28px;cursor:pointer;width:36px;height:36px;display:flex;align-items:center;justify-content:center;border-radius:50%;background:rgba(255,255,255,.1);z-index:101}
#gsv{width:100%;height:560px}#gsv .lk{stroke:var(--bd2);stroke-width:1;fill:none}#gsv .lk-r{stroke-dasharray:4 3}#gsv .lk-e{stroke:var(--te);opacity:.4}#gsv .nr{rx:6;ry:6;stroke-width:1;cursor:grab}#gsv .nr:hover{stroke-width:2}#gsv .nl{font-size:10px;font-family:var(--f);pointer-events:none;text-anchor:middle;dominant-baseline:central}#gsv .ah{fill:var(--t3)}
</style>
</head>
<body>
<div class="ctr">
<div class="hdr"><div><h1>Deep Learning Knowledge Graph</h1><p class="sub"><span id="tc"></span> topics · schema v1.1</p></div><div class="font-ctl"><button onclick="chFS(-1)">A−</button><span id="fsl">13</span><button onclick="chFS(1)">A+</button></div></div>
<div class="nav"><button class="on" onclick="V('land')">Landscape</button><button onclick="V('arch')">Architecture</button><button onclick="V('graph')">Graph</button><button onclick="V('math')">Math</button><button onclick="V('gal')">Diagrams</button></div>
<div class="search-box"><span class="icon">🔍</span><input id="sq" type="text" placeholder="Search topics, insights, math..." oninput="doSearch(this.value)"><div id="sr"></div></div>
<div id="v-land"></div><div id="v-arch" style="display:none"></div><div id="v-graph" style="display:none"></div><div id="v-math" style="display:none"></div><div id="v-gal" style="display:none"></div><div id="v-det" class="det"></div>
</div>
<div class="lb" id="lb" onclick="clb()"><div class="lbc" onclick="clb()">×</div><div id="lbc"></div></div>
<script>
let IX=null,TP={},GR=false,curFS=13,archDrawn={};
const RM=el=>{if(typeof renderMathInElement==='function')renderMathInElement(el,{delimiters:[{left:'$$',right:'$$',display:true},{left:'$',right:'$',display:false}],throwOnError:false})};
function chFS(d){curFS=Math.max(10,Math.min(20,curFS+d));document.documentElement.style.setProperty('--fs',curFS+'px');document.getElementById('fsl').textContent=curFS}
async function init(){const r=await fetch('index.json');IX=await r.json();document.getElementById('tc').textContent=Object.keys(IX.topics).length;rLand()}
async function lT(id){if(TP[id])return TP[id];try{const r=await fetch(`topics/${id}.json`);TP[id]=await r.json();return TP[id]}catch(e){return null}}
async function doSearch(q){const sr=document.getElementById('sr');if(!q||q.length<2){sr.innerHTML='';return}q=q.toLowerCase();const res=[];for(const[id,t]of Object.entries(IX.topics)){const f=[t.title,t.summary,...(t.math_depth_topics||[])].join(' ').toLowerCase();if(f.includes(q)){res.push({id,title:t.title,status:t.status,match:t.summary})}else{const full=await lT(id);if(!full)continue;if(JSON.stringify(full).toLowerCase().includes(q)){const ki=(full.key_insights||[]).find(i=>i.toLowerCase().includes(q));res.push({id,title:t.title,status:t.status,match:ki?'Insight: '+ki.substring(0,100):t.summary})}}}sr.innerHTML=res.slice(0,10).map(r=>`<div class="sr-item" onclick="sT('${r.id}')"><div class="sr-title"><span class="st st-${r.status}" style="font-size:9px;margin-right:6px">${r.status}</span>${r.title}</div><div class="sr-match">${r.match.substring(0,120)}...</div></div>`).join('')||'<div style="font-size:12px;color:var(--t3);padding:8px">No results</div>'}
function rLand(){const G={};for(const[id,t]of Object.entries(IX.topics)){const g=id.split('.')[0];if(!G[g])G[g]=[];G[g].push({id,...t})}const L={FOUNDATIONS:'Foundations',TRANSFORMER:'Transformer',CNN:'CNN',HYBRID:'Hybrid',AUTOENCODER:'Autoencoders',GAN:'GANs',DIFFUSION:'Diffusion',RNN:'RNNs',GNN:'Graph networks',MULTIMODAL:'Multimodal',PRODUCTION:'Production'};const O=['FOUNDATIONS','TRANSFORMER','CNN','HYBRID','AUTOENCODER','GAN','DIFFUSION','RNN','GNN','MULTIMODAL','PRODUCTION'];let h='';for(const g of O){const items=G[g];if(!items)continue;h+=`<div class="grp"><div class="gt">${L[g]||g} · ${items.length}</div><div class="tg">`;for(const t of items){const mb=t.has_math_depth?'<span class="mb">📐</span>':'';h+=`<div class="tc" onclick="sT('${t.id}')"><div class="cm"><span class="st st-${t.status}">${t.status}</span>${mb}</div><div class="ti">${t.title}</div><div class="sm">${t.summary}</div></div>`}h+='</div></div>'}if(IX.open_questions?.length){h+='<div class="grp"><div class="gt">Open questions</div>';for(const oq of IX.open_questions)h+=`<div class="oq"><div class="oqt">${oq.id}</div><div class="oqx">${oq.question}</div></div>`;h+='</div>'}document.getElementById('v-land').innerHTML=h}

function rArch(){
  const ct=document.getElementById('v-arch');
  if(ct.querySelector('.arch-tabs'))return;
  let h='<div class="grp"><div class="gt">Architecture — click any block to open its topic</div></div>';
  h+='<div class="arch-tabs"><div class="arch-tab on" onclick="showArchSvg(\'transformer\',this)">Transformer</div><div class="arch-tab" onclick="showArchSvg(\'cnn\',this)">CNN</div></div>';
  h+='<div id="arch-transformer"></div><div id="arch-cnn" style="display:none"></div>';
  ct.innerHTML=h;
  drawTransformerArch();
  drawCNNArch();
}
function showArchSvg(which,el){
  el.parentElement.querySelectorAll('.arch-tab').forEach(t=>t.classList.remove('on'));el.classList.add('on');
  document.getElementById('arch-transformer').style.display=which==='transformer'?'block':'none';
  document.getElementById('arch-cnn').style.display=which==='cnn'?'block':'none';
}

function drawTransformerArch(){} // defined in arch_diagrams.js
function drawCNNArch(){} // defined in arch_diagrams.js

function rGal(){const a=[];if(IX.artifacts?.diagrams)for(const d of IX.artifacts.diagrams)a.push({...d,tp:'d'});if(IX.artifacts?.docs)for(const d of IX.artifacts.docs)a.push({...d,tp:'x'});let h='<div class="grp"><div class="gt">Diagrams</div><div class="gg">';for(const i of a.filter(x=>x.tp==='d')){const s=i.file.endsWith('.svg');h+=`<div class="gc"><img class="gp" src="${i.file}" onclick="olb('${i.file}',${s})" alt="${i.description}"/><div class="gi"><div class="ti">${i.description}</div><div class="de">${i.file.split('.').pop().toUpperCase()} · click to enlarge</div><div class="tr">${i.topic}</div></div></div>`}h+='</div></div><div class="grp"><div class="gt">Documents</div><div class="gg">';for(const i of a.filter(x=>x.tp==='x')){const e=i.file.split('.').pop().toUpperCase();h+=`<div class="gc"><div style="width:100%;aspect-ratio:16/10;background:var(--bg3);border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:center"><span style="font-size:32px;color:var(--t3)">${e==='PDF'?'📕':'📄'}</span></div><div class="gi"><div class="ti">${i.description}</div><div class="de">${e} · <a href="${i.file}" style="color:var(--bl)">download</a></div><div class="tr">${i.topic}</div></div></div>`}h+='</div></div>';document.getElementById('v-gal').innerHTML=h}
function olb(f,s){const l=document.getElementById('lb'),c=document.getElementById('lbc');c.innerHTML=s?`<object data="${f}" type="image/svg+xml" style="max-width:95%;max-height:90vh;background:#fff;border-radius:8px;padding:16px"></object>`:`<img src="${f}" style="max-width:95%;max-height:90vh"/>`;l.classList.add('on');event.stopPropagation()}
function clb(){document.getElementById('lb').classList.remove('on')}
document.addEventListener('keydown',e=>{if(e.key==='Escape')clb()});

function rMath(){let h='<div class="grp"><div class="gt">All derivations & proofs</div>';for(const[id,t]of Object.entries(IX.topics)){if(t.has_math_depth&&t.math_depth_topics){h+=`<div style="margin-bottom:14px;padding:10px 14px;background:var(--bg2);border:1px solid var(--bd);border-radius:var(--r2)"><div style="font-weight:600;cursor:pointer" onclick="sT('${id}')">${t.title}</div><div style="margin-top:6px">`;for(const m of t.math_depth_topics)h+=`<div style="font-size:.9em;color:var(--t2);padding:2px 0 2px 14px;position:relative"><span style="position:absolute;left:0;color:var(--pu)">📐</span>${m}</div>`;h+='</div></div>'}}h+='</div>';document.getElementById('v-math').innerHTML=h}

function rGraph(){if(GR)return;GR=true;const ct=document.getElementById('v-graph');ct.innerHTML='<div class="grp"><div class="gt">Drag nodes · click to drill in</div></div>';const w=ct.clientWidth||1060,ht=560;const gc={FOUNDATIONS:{f:'var(--bll)',s:'var(--bl)',t:'var(--bl)'},TRANSFORMER:{f:'var(--tel)',s:'var(--te)',t:'var(--te)'},CNN:{f:'var(--grl)',s:'var(--gr)',t:'var(--gr)'},HYBRID:{f:'var(--grl)',s:'var(--te)',t:'var(--te)'},AUTOENCODER:{f:'var(--pul)',s:'var(--pu)',t:'var(--pu)'},GAN:{f:'var(--orl)',s:'var(--or)',t:'var(--or)'},DIFFUSION:{f:'var(--orl)',s:'var(--or)',t:'var(--or)'},RNN:{f:'var(--bg3)',s:'var(--t3)',t:'var(--t2)'},GNN:{f:'var(--acl)',s:'var(--ac)',t:'var(--ac)'},MULTIMODAL:{f:'var(--rel)',s:'var(--re)',t:'var(--re)'},PRODUCTION:{f:'var(--acl)',s:'var(--ac)',t:'var(--ac)'}};const ns=Object.entries(IX.topics).map(([id,t])=>{const g=id.split('.')[0],c=gc[g]||gc.FOUNDATIONS;return{id,title:t.title.replace(/\s*\(.*?\)/g,'').substring(0,26),group:g,fill:c.f,stroke:c.s,tc:c.t,status:t.status}});const ni=new Set(ns.map(n=>n.id));const ls=IX.connections.filter(c=>ni.has(c.from)&&ni.has(c.to)).map(c=>({source:c.from,target:c.to,type:c.type}));const svg=d3.select(ct).append('svg').attr('id','gsv').attr('width',w).attr('height',ht).attr('viewBox',`0 0 ${w} ${ht}`);svg.append('defs').append('marker').attr('id','ah').attr('viewBox','0 0 10 10').attr('refX',20).attr('refY',5).attr('markerWidth',5).attr('markerHeight',5).attr('orient','auto').append('path').attr('d','M0 0L10 5L0 10z').attr('class','ah');const gx={FOUNDATIONS:120,TRANSFORMER:380,CNN:620,HYBRID:620,AUTOENCODER:200,GAN:350,DIFFUSION:500,RNN:120,GNN:750,MULTIMODAL:500,PRODUCTION:900};const gy={FOUNDATIONS:140,TRANSFORMER:280,CNN:160,HYBRID:350,AUTOENCODER:430,GAN:430,DIFFUSION:480,RNN:400,GNN:300,MULTIMODAL:480,PRODUCTION:460};const sim=d3.forceSimulation(ns).force('link',d3.forceLink(ls).id(d=>d.id).distance(110).strength(.25)).force('charge',d3.forceManyBody().strength(-250)).force('center',d3.forceCenter(w/2,ht/2)).force('collision',d3.forceCollide().radius(55)).force('x',d3.forceX(d=>gx[d.group]||w/2).strength(.12)).force('y',d3.forceY(d=>gy[d.group]||ht/2).strength(.12));const lk=svg.append('g').selectAll('line').data(ls).join('line').attr('class',d=>`lk ${d.type==='related'?'lk-r':''} ${d.type==='enables'?'lk-e':''}`).attr('marker-end','url(#ah)');const ng=svg.append('g').selectAll('g').data(ns).join('g').call(d3.drag().on('start',(e,d)=>{if(!e.active)sim.alphaTarget(.3).restart();d.fx=d.x;d.fy=d.y}).on('drag',(e,d)=>{d.fx=e.x;d.fy=e.y}).on('end',(e,d)=>{if(!e.active)sim.alphaTarget(0);d.fx=null;d.fy=null})).style('cursor','grab').on('click',(e,d)=>{e.stopPropagation();sT(d.id)});ng.append('rect').attr('class','nr').attr('width',110).attr('height',32).attr('x',-55).attr('y',-16).attr('fill',d=>d.fill).attr('stroke',d=>d.stroke).attr('opacity',d=>d.status==='skeleton'?.5:1);ng.append('text').attr('class','nl').attr('fill',d=>d.tc).attr('font-size',d=>d.title.length>22?'9px':'10px').text(d=>d.title);sim.on('tick',()=>{lk.attr('x1',d=>d.source.x).attr('y1',d=>d.source.y).attr('x2',d=>d.target.x).attr('y2',d=>d.target.y);ng.attr('transform',d=>{d.x=Math.max(60,Math.min(w-60,d.x));d.y=Math.max(20,Math.min(ht-20,d.y));return`translate(${d.x},${d.y})`})})}

async function sT(id){const t=await lT(id);if(!t)return;document.getElementById('sq').value='';document.getElementById('sr').innerHTML='';let h=`<span class="bk" onclick="V('land')">← Back</span>`;h+=`<div class="dh"><span class="st st-${t.status}">${t.status}</span><div class="dt">${t.title}</div><div class="dp">${t.parent} › ${t.topic_id}</div><div class="ds">${t.summary}</div></div>`;if(t.key_insights?.length){h+=`<div class="sec"><div class="stl">Key insights</div><ul class="il">`;for(const i of t.key_insights)h+=`<li>${i}</li>`;h+='</ul></div>'}
if(t.mathematical_core){h+=`<div class="sec"><div class="stl">Mathematical core</div>`;const rr=(o,d=0)=>{let s='';for(const[k,v]of Object.entries(o)){if(typeof v==='object'&&!Array.isArray(v)){s+=`<div style="font-weight:600;color:var(--t2);margin-top:8px;padding-left:${d*12}px;font-size:.9em">${k}</div>`;s+=rr(v,d+1)}else{s+=`<div class="mblk" style="margin-left:${d*12}px"><strong>${k}:</strong> ${v}</div>`}}return s};h+=rr(t.mathematical_core)+'</div>'}
if(t.mathematical_depth){h+=`<div class="sec"><div class="stl">Mathematical depth</div>`;if(t.mathematical_depth.derivations?.length)for(const d of t.mathematical_depth.derivations){h+=`<div class="drv" onclick="this.classList.toggle('op')"><div class="dvt">${d.title} <span class="ar">▶</span></div><div class="dvb">`;if(d.steps)for(const s of d.steps){h+=`<div class="stp">`;if(s.name)h+=`<div class="stn">${s.name}</div>`;if(s.setup)h+=`<div style="color:var(--t2);margin-bottom:4px;font-size:.9em">${s.setup}</div>`;if(s.math)h+=`<div class="stm">${s.math}</div>`;if(s.result)h+=`<div class="str">→ ${s.result}</div>`;h+='</div>'}if(d.math)h+=`<div class="mblk">${d.math}</div>`;if(d.consequence)h+=`<div class="csq">⟹ ${d.consequence}</div>`;if(d.summary)h+=`<div class="csq">${d.summary}</div>`;if(d.connects_to)h+=`<div class="nt">Connects to: ${d.connects_to}</div>`;if(d.status)h+=`<div style="color:var(--or);margin-top:6px;font-size:.9em">⚠ ${d.status}</div>`;h+='</div></div>'}if(t.mathematical_depth.worked_examples?.length)for(const e of t.mathematical_depth.worked_examples){h+=`<div style="padding:6px 0"><strong>${e.title}</strong>`;if(e.reference)h+=` — <span class="nt">${e.reference}</span>`;if(e.note)h+=`<br><span style="color:var(--t2);font-size:.9em">${e.note}</span>`;h+='</div>'}if(t.mathematical_depth.status)h+=`<div class="nt" style="margin-top:8px">${t.mathematical_depth.status}</div>`;h+='</div>'}
for(const sk of['signal_processing_bridge','key_contrast_with_transformer','hybrid_architectures','properties_to_explore','design_decisions','comparison']){if(!t[sk])continue;const obj=t[sk];const label=sk.replace(/_/g,' ').replace(/\b\w/g,c=>c.toUpperCase());h+=`<div class="sec"><div class="stl">${label}</div>`;for(const[k,v]of Object.entries(obj)){if(k==='description')continue;if(typeof v==='string')h+=`<div class="mblk"><strong>${k.replace(/_/g,' ')}:</strong> ${v}</div>`;else if(Array.isArray(v)){h+=`<div style="font-weight:600;color:var(--t2);margin-top:6px;font-size:.9em">${k.replace(/_/g,' ')}</div>`;for(const item of v)h+=`<div style="color:var(--t2);padding:2px 0 2px 14px;font-size:.9em">• ${typeof item==='object'?Object.values(item).join(' — '):item}</div>`}else if(typeof v==='object'){h+=`<div style="font-weight:600;color:var(--t2);margin-top:6px;font-size:.9em">${k.replace(/_/g,' ')}</div>`;for(const[k2,v2]of Object.entries(v))h+=`<div class="mblk"><strong>${k2}:</strong> ${v2}</div>`}}if(obj.description)h+=`<div class="nt">${obj.description}</div>`;h+='</div>'}
const pp=[['geometric_properties','Geometric','pg','▲'],['statistical_properties','Statistical','ps','●'],['numerical_properties','Numerical','pn','■']];let hp=false,ph=`<div class="sec"><div class="stl">Diagnostic properties</div>`;for(const[k,l,c,i]of pp)if(t[k]?.length){hp=true;for(const p of t[k])ph+=`<div class="pb ${c}"><span class="pl">${i} ${l}:</span> ${p}</div>`}if(hp)h+=ph+'</div>';
if(t.connections){h+=`<div class="sec"><div class="stl">Connections</div><ul class="cl">`;for(const[tp,items]of Object.entries(t.connections))for(const item of(Array.isArray(items)?items:[items])){const isT=/^(TRANSFORMER|FOUNDATIONS|PRODUCTION|CNN|AUTOENCODER|GAN|DIFFUSION|RNN|GNN|MULTIMODAL|HYBRID)\./.test(item);const d=isT?`<span class="clk" onclick="event.stopPropagation();sT('${item}')">${item}</span>`:item;h+=`<li><span class="ct">${tp}:</span> ${d}</li>`}h+='</ul></div>'}
if(t.open_questions?.length){h+=`<div class="sec"><div class="stl">Open questions</div>`;for(const o of t.open_questions)h+=`<div class="oq"><div class="oqx">${o}</div></div>`;h+='</div>'}
if(t.discussion_history?.length){h+=`<div class="sec"><div class="stl">Discussion history</div>`;for(const d of t.discussion_history)h+=`<div class="nt">${d}</div>`;h+='</div>'}
if(t.application_relevance)h+=`<div class="sec"><div class="stl">Application relevance</div><p style="color:var(--t2);line-height:1.6">${t.application_relevance}</p></div>`;
if(t.application_ideas?.length){h+=`<div class="sec"><div class="stl">Application ideas</div><ul class="il">`;for(const i of t.application_ideas)h+=`<li>${i}</li>`;h+='</ul></div>'}
if(t.application_examples?.length){h+=`<div class="sec"><div class="stl">Application examples</div>`;for(const e of t.application_examples)h+=`<div style="padding:4px 0"><strong>${e.task}</strong> → ${e.variant} <span class="nt">— ${e.reason}</span></div>`;h+='</div>'}
if(t.application_patterns?.length){h+=`<div class="sec"><div class="stl">Application patterns</div>`;for(const p of t.application_patterns)h+=`<div style="padding:4px 0;margin-bottom:4px"><strong>${p.domain}:</strong> ${p.approach}${p.example?' <span class="nt">— '+p.example+'</span>':''}</div>`;h+='</div>'}
if(t.artifacts?.length){h+=`<div class="sec"><div class="stl">Artifacts</div>`;for(const a of t.artifacts){h+=`<div style="padding:3px 0;color:var(--t2);font-size:.9em">📄 ${a.ref}`;if(a.section)h+=` — ${a.section}`;if(a.note)h+=` — ${a.note}`;h+='</div>'}h+='</div>'}
const cn=(t.notes||[]).join('\n');h+=`<div class="sec"><div class="stl">Notes <span style="font-weight:400;font-size:10px;text-transform:none;letter-spacing:0">(editable)</span></div><div class="ne"><textarea id="nta" placeholder="Add notes...">${cn}</textarea><div class="na"><button class="bs" onclick="sN('${id}')">Save</button><button class="bc" onclick="rN('${id}')">Reset</button><span class="ss" id="ss">Saved ✓</span><span style="flex:1"></span><span style="font-size:11px;color:var(--t3)">Downloads JSON</span></div></div></div>`;
const el=document.getElementById('v-det');el.innerHTML=h;V('det');window.scrollTo(0,0);RM(el)}

function sN(id){const ta=document.getElementById('nta');TP[id].notes=ta.value.split('\n').map(n=>n.trim()).filter(n=>n);TP[id].date_updated=new Date().toISOString().split('T')[0];const b=new Blob([JSON.stringify(TP[id],null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=`${id}.json`;a.click();URL.revokeObjectURL(a.href);const s=document.getElementById('ss');s.classList.add('sh');setTimeout(()=>s.classList.remove('sh'),2000)}
function rN(id){document.getElementById('nta').value=(TP[id]?.notes||[]).join('\n')}
function V(v){for(const x of['land','arch','graph','math','gal','det'])document.getElementById('v-'+x).style.display=x===v?'block':'none';document.getElementById('v-det').className=v==='det'?'det on':'det';document.querySelectorAll('.nav button').forEach(b=>b.classList.remove('on'));const i={land:0,arch:1,graph:2,math:3,gal:4}[v];if(i!==undefined)document.querySelectorAll('.nav button')[i].classList.add('on');if(v==='arch')rArch();if(v==='graph')rGraph();if(v==='math')rMath();if(v==='gal')rGal()}
init();
if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js')}
</script>
